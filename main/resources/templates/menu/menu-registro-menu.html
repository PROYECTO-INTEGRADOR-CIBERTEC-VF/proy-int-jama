<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Menu Form</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

        <style>
            body {
                background-color: #f5f7fa;
            }

            .panel {
                background: #fff;
                border-radius: 16px;
                box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
                padding: 24px;
            }

            .section-title {
                font-weight: 700;
                margin-bottom: 1rem;
            }

            .sku-card {
                border: 1px solid #dee2e6;
                border-radius: 14px;
                padding: 16px;
                margin-bottom: 16px;
                background: #fafafa;
            }

            .remove-btn {
                margin-top: 32px;
            }
        </style>
    </head>
    <body>

        <div class="container-fluid py-4">
            <div class="row g-4">

                <!-- LEFT SIDE: MENU FORM -->
                <div class="col-lg-5">
                    <div class="panel">
                        <h3 class="section-title">Menu Form</h3>

                        <form action="#" method="post">
                            <input type="hidden" name="id">

                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Menu name"
                                       required>
                            </div>

                            <div class="mb-3 form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="estaBloqueado" name="estaBloqueado">
                                <label class="form-check-label" for="estaBloqueado">Está bloqueado</label>
                            </div>

                            <div class="mb-3">
                                <label for="precioTotal" class="form-label">Precio Total</label>
                                <input type="number" step="0.01" id="precioTotal" name="precioTotal" class="form-control"
                                       placeholder="0.00">
                            </div>

                            <div class="mb-3">
                                <label for="descuento" class="form-label">Descuento</label>
                                <input type="number" step="0.01" id="descuento" name="descuento" class="form-control"
                                       placeholder="0.00">
                            </div>

                            <hr class="my-4">

                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h4 class="section-title mb-0">Menu SKUs</h4>
                                <button type="button" class="btn btn-primary btn-sm" onclick="addSkuRow()">
                                    + Add MenuSku
                                </button>
                            </div>

                            <!--card skus-->
                            <div class="card shadow-sm border-0 rounded-4 mt-3">
                                <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center">
                                    <h5 class="mb-0 fw-semibold">Selected Menu SKUs</h5>
                                    <span class="badge bg-primary">2 items</span>
                                </div>

                                <div class="card-body p-0">
                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle mb-0">
                                            <thead class="table-light">
                                                <tr>
                                                    <th class="ps-4">ID</th>
                                                    <th>Nombre</th>
                                                    <th>Precio</th>
                                                    <th class="text-end pe-4">Acciones</th>
                                                </tr>
                                            </thead>

                                            <tbody>
                                                <tr>
                                                    <td class="ps-4 fw-semibold text-primary">#1</td>
                                                    <td>Classic Burger</td>
                                                    <td>$14.00</td>
                                                    <td class="text-end pe-4">
                                                        <button class="btn btn-sm btn-outline-danger">
                                                            Remove
                                                        </button>
                                                    </td>
                                                </tr>



                                                <!-- empty state -->
                                                <tr>
                                                    <td colspan="4" class="text-center text-muted py-4">
                                                        No SKUs selected
                                                    </td>
                                                </tr>

                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-success w-100">Save Menu</button>
                                <button type="reset" class="btn btn-outline-secondary w-100">Clear</button>
                            </div>
                        </form>
                    </div>
                    <div>
                        <!-- Back button -->
                        <div class="text-left mt-3">
                            <a class="btn btn-secondary">Volver</a>
                        </div>
                    </div>
                </div>

                <!-- RIGHT SIDE: LIST -->
                <div class="col-lg-7">
                    <div class="panel">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h3 class="section-title mb-0">Menu List</h3>
                            <input type="text" class="form-control w-auto" placeholder="Search...">
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Bloqueado</th>
                                        <th>Precio Total</th>
                                        <th>Descuento</th>
                                        <th># SKUs</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>1</td>
                                        <td>Combo Burger</td>
                                        <td><span class="badge bg-success">No</span></td>
                                        <td>45.00</td>
                                        <td>5.00</td>
                                        <td>3</td>
                                        <td>
                                            <button class="btn btn-sm btn-warning">Edit</button>
                                            <button class="btn btn-sm btn-danger">Delete</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>2</td>
                                        <td>Pizza Promo</td>
                                        <td><span class="badge bg-danger">Yes</span></td>
                                        <td>60.00</td>
                                        <td>10.00</td>
                                        <td>2</td>
                                        <td>
                                            <button class="btn btn-sm btn-warning">Edit</button>
                                            <button class="btn btn-sm btn-danger">Delete</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <hr class="my-4">


                    </div>
                </div>

            </div>
        </div>


    </body>
</html>
