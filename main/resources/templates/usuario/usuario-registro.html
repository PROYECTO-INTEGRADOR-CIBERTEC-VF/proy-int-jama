<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registro de nuevo usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">User Form</h2>

    <form th:object="${usuarioDataDto}" th:action="@{/usuario/usuario-registro/save}" method="post">

        <!-- ID hidden -->
        <input type="hidden" name="id" th:value="*{users.id} ">

        <!-- Login -->
        <div class="mb-3">
            <label class="form-label">Login</label>
            <input type="text" class="form-control" name="loginid" required th:field="*{users.loginid}">
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required th:field="*{users.password}">
        </div>

        <!-- Nombre -->
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" name="nombre" th:field="*{userData.nombre}">
        </div>

        <!-- Apellido -->
        <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" class="form-control" name="apellido" th:field="*{userData.apellido}">
        </div>

        <!-- DNI -->
        <div class="mb-3">
            <label class="form-label">DNI</label>
            <input type="text" class="form-control" name="dni" th:field="*{userData.dni}">
        </div>

        <!-- Esta Bloqueado -->
        <div class="mb-3">
            <label class="form-label">¿Está bloqueado?</label>
            <select class="form-select" name="estaBloqueado" th:field="*{users.estaBloqueado}">
                <option value="false">No</option>
                <option value="true">Sí</option>
            </select>
        </div>

        <!-- User Rol -->
        <div class="mb-3">
            <label class="form-label">User Rol</label>

            <select class="form-select" name="userRol" th:field="*{users.userRol}">
                <option
                        th:each="r : ${usuarioDataDto.userRols}"
                        th:value="${r.id}"
                        th:text="${r.rol}"
                ></option>
            </select>
        </div>

        <!-- Cargo -->
        <div class="mb-3">
            <label class="form-label">Cargo</label>
            <select class="form-select" name="cargo" th:field="*{userData.cargo}">
                <option
                        th:each="r : ${usuarioDataDto.userPositions}"
                        th:value="${r.id}"
                        th:text="${r.nombre}"
                ></option>
            </select>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary">Guardar</button>
<!--        <a th:href="@{/main/back}" class="btn btn-secondary">Cancelar</a>-->
        <button type="button" class="btn btn-secondary"
                onclick="history.back()">
            Cancelar
        </button>
    </form>
</div>
</body>
</html>
