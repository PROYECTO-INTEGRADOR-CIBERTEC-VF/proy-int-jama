<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Listado de Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4 text-center">Listado de Usuarios</h2>

    <table class="table table-bordered table-striped table-hover text-center">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Login</th>
            <th>Nombre Completo</th>
            <th>Bloqueado</th>
            <th>Rol</th>
            <th>Cargo</th>
            <th>acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="u : ${users}">

            <td th:text="${u.id}"></td>

            <td th:text="${u.loginid}"></td>

            <!-- Nombre + Apellido -->
            <td th:text="${u.userData.nombre + ' ' + u.userData.apellido}"></td>

            <!-- Boolean -->
            <td>
                    <span th:text="${u.estaBloqueado ? 'Sí' : 'No'}"
                          th:classappend="${u.estaBloqueado} ? 'text-danger' : 'text-success'">
                    </span>
            </td>

            <!-- Relaciones -->
            <td th:text="${u.userRol.rol}"></td>

            <td th:text="${u.userData.cargo}"></td>

            <!-- Acciones-->
            <td>
                <a th:href="@{/usuario/usuario-listado/edit/{id}(id=${u.id})}"
                   class="btn btn-warning btn-sm">✏️</a>

                <a th:href="@{/usuario/usuario-listado/delete/{id}(id=${u.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar usuario?')">🗑</a>
            </td>

        </tr>
        </tbody>

    </table>

    <!-- Back button -->
    <div class="text-center mt-3">
        <a th:href="@{/usuario}" class="btn btn-secondary">Volver</a>
    </div>

</div>

</body>
</html>
