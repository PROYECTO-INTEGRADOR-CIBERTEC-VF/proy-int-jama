<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Configuracion del usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="text-center">

        <h2 class="mb-4">Gestión de Usuarios</h2>

        <!-- Optional: show logged user -->
        <p class="text-muted mb-4" th:text="'Usuario: ' + ${session.loginid}"></p>

        <div class="d-grid gap-3">

            <a th:href="@{/usuario/usuario-listado}" class="btn btn-primary">
                 Listado de usuarios
            </a>

            <a th:href="@{/usuario/usuario-registro}" class="btn btn-success">
                  Registrar nuevo usuario
            </a>

            <a th:href="@{/usuario/usuario-registro-cargos}" class="btn btn-warning">
                   Registrar nuevos cargos
            </a>

            <!-- Back button -->
            <a th:href="@{/menu/main-menu}" class="btn btn-secondary mt-3">
                 Volver al menú principal
            </a>

        </div>

    </div>
</div>
</body>
</html>
