<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ventas Mensuales - FastFood Jama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .menu-btn {
            transition: all 0.25s ease;
            border-radius: 10px;
        }
        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/reporte}" class="btn btn-outline-primary btn-sm">Reportes</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow">

        <div class="card-header bg-primary text-white text-center">
            <h4 class="mb-0 fw-bold">Reporte de ventas mensual</h4>
        </div>

        <div class="card-body">

            <div class="mb-3 d-flex gap-2 justify-content-center">
                <a th:href="@{/reporte/ventas-mensuales/csv}" class="btn btn-success btn-sm menu-btn">Exportar CSV</a>
                <a th:href="@{/reporte/ventas-mensuales/excel}" class="btn btn-warning btn-sm menu-btn">Exportar Excel</a>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle text-center">

                    <thead class="table-dark">
                    <tr>
                        <th>Año</th>
                        <th>Mes</th>
                        <th>Cantidad de ventas</th>
                        <th>Total vendido</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:if="${#lists.isEmpty(ventasMensuales)}">
                        <td colspan="4" class="text-muted">No hay ventas registradas</td>
                    </tr>

                    <tr th:each="v : ${ventasMensuales}">
                        <td th:text="${v[0]}"></td>
                        <td th:text="${v[1]}"></td>
                        <td th:text="${v[2]}"></td>
                        <td th:text="'S/ ' + ${#numbers.formatDecimal(v[3], 1, 2)}"></td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>

    </div>

</div>

</body>
</html>
