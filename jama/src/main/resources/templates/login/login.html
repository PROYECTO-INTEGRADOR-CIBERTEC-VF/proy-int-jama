<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - FastFood Jama</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="height: 85vh;">

    <div class="card bg-secondary-subtle text-dark shadow" style="max-width: 400px; width: 100%;">

        <div class="card-header bg-warning text-center">
            <h3 class="mb-0 fw-bold">Iniciar sesión</h3>
        </div>

        <div class="card-body">

            <form th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label class="form-label">Login</label>
                    <input type="text" class="form-control" name="loginid" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required>
                </div>

                <button type="submit" class="btn btn-dark w-100 fw-bold">
                    Ingresar
                </button>
            </form>

            <a th:href="@{/usuario/usuario-registro}"
               class="btn btn-link mt-3 text-center d-block">
                Registrar usuario
            </a>

        </div>

    </div>

</div>

</body>
</html>
