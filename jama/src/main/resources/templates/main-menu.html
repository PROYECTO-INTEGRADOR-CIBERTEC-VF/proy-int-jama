<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Menú Principal - FastFood Jama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .menu-btn {
            transition: all 0.25s ease;
            border-radius: 10px;
        }

        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .menu-icon {
            font-size: 1.3rem;
            margin-right: 8px;
        }
    </style>
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>

    <div>
        <span class="text-light small" th:text="'Usuario: ' + ${session.loginid}"></span>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="height: 85vh;">

    <div class="card bg-secondary-subtle text-dark shadow text-center" style="width: 380px;">

        <div class="card-header bg-warning">
            <h3 class="mb-0 fw-bold">Menú Principal</h3>
        </div>

        <div class="card-body">

            <p class="text-muted mb-4">
                Selecciona un módulo del sistema
            </p>

            <div class="d-grid gap-3">

                <a th:href="@{/menu}" class="btn btn-danger menu-btn fw-bold">
                    <span class="menu-icon">🍔</span> Menú
                </a>

                <a th:href="@{/pedido}" class="btn btn-primary menu-btn fw-bold">
                    <span class="menu-icon">🧾</span> Pedido
                </a>

                <a th:href="@{/venta}" class="btn btn-success menu-btn fw-bold">
                    <span class="menu-icon">💰</span> Venta
                </a>

                <a th:href="@{/usuario}" class="btn btn-secondary menu-btn fw-bold">
                    <span class="menu-icon">👤</span> Usuario
                </a>

                <a th:href="@{/reporte}" class="btn btn-dark menu-btn fw-bold">
                    <span class="menu-icon">📊</span> Reporte
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
