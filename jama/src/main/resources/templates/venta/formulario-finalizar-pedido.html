<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar venta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <a class="navbar-brand fw-bold" th:href="@{/venta}">Ventas</a>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/venta/finalizar-pedido}" class="btn btn-outline-success btn-sm">Pedidos para finalizar</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">Finalizar pedido y registrar venta</h4>
        </div>

        <div class="card-body">

            <div class="alert alert-info">
                <strong>Pedido:</strong> <span th:text="'#' + ${pedido.id}"></span> |
                <strong>Cliente:</strong> <span th:text="${pedido.clienteNombre}"></span> |
                <strong>Total:</strong>
                S/ <span th:text="${#numbers.formatDecimal(pedido.precioTotal, 1, 2)}"></span>
            </div>

            <form th:action="@{/venta/registrar}" method="post">

                <input type="hidden" name="pedidoId" th:value="${pedido.id}">

                <div class="mb-3">
                    <label class="form-label">Método de pago</label>
                    <select name="metodoDePago" class="form-select" required>
                        <option value="">Seleccione</option>
                        <option value="Efectivo">Efectivo</option>
                        <option value="Tarjeta">Tarjeta</option>
                        <option value="Yape">Yape</option>
                        <option value="Plin">Plin</option>
                        <option value="Transferencia">Transferencia</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descuento dado</label>
                    <input type="text" name="descuentoDado" class="form-control" placeholder="Ejemplo: Ninguno / 10%">
                </div>

                <div class="mb-3">
                    <label class="form-label">Descuento aprobado por</label>
                    <input type="text" name="descuentoAprobadoPor" class="form-control" placeholder="Ejemplo: Administrador">
                </div>

                <div class="mb-3">
                    <label class="form-label">Propina</label>
                    <input type="number" name="propina" class="form-control" value="0" step="0.10" min="0">
                </div>

                <button class="btn btn-success">Confirmar venta</button>
                <a th:href="@{/venta/finalizar-pedido}" class="btn btn-outline-dark">Cancelar</a>

            </form>

        </div>
    </div>

</div>

</body>
</html>
