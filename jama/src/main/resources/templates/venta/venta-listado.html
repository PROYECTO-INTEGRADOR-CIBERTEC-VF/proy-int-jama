<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Ventas - FastFood Jama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .menu-btn {
            transition: all 0.25s ease;
            border-radius: 10px;
        }
        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/venta}" class="btn btn-outline-success btn-sm">Ventas</a>
    </div>
</nav>

<div class="container py-4">

    <div th:if="${param.success}" class="alert alert-success text-center">
        Venta registrada correctamente
    </div>

    <div class="card bg-secondary-subtle text-dark shadow">

        <div class="card-header bg-success text-white text-center">
            <h4 class="mb-0 fw-bold">Listado de ventas realizadas</h4>
        </div>

        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle text-center">

                    <thead class="table-dark">
                    <tr>
                        <th>ID Venta</th>
                        <th>Pedido</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Método de pago</th>
                        <th>Monto</th>
                        <th>Propina</th>
                        <th>Pago</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:if="${#lists.isEmpty(ventas)}">
                        <td colspan="8" class="text-muted">
                            No hay ventas registradas
                        </td>
                    </tr>

                    <tr th:each="venta : ${ventas}">
                        <td th:text="${venta.id}"></td>
                        <td th:text="'Pedido #' + ${venta.pedido.id}"></td>
                        <td th:text="${venta.pedido.clienteNombre}"></td>
                        <td th:text="${#temporals.format(venta.fechaVenta, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${venta.metodoDePago}"></td>
                        <td th:text="'S/ ' + ${#numbers.formatDecimal(venta.montoTotal, 1, 2)}"></td>
                        <td th:text="'S/ ' + ${#numbers.formatDecimal(venta.propina, 1, 2)}"></td>
                        <td>
                            <span th:if="${venta.pagoEstaRealizado}" class="badge bg-success">Pagado</span>
                            <span th:unless="${venta.pagoEstaRealizado}" class="badge bg-danger">Pendiente</span>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>

    </div>

</div>

</body>
</html>
