<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Pedido - FastFood Jama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .menu-btn {
            transition: all 0.25s ease;
            border-radius: 10px;
        }
        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/venta}" class="btn btn-outline-success btn-sm">Ventas</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow">

        <div class="card-header bg-success text-white text-center">
            <h4 class="mb-0 fw-bold">Pedidos disponibles para finalizar</h4>
        </div>

        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle text-center">

                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Mesa</th>
                        <th>Cliente</th>
                        <th>Estado</th>
                        <th>Total</th>
                        <th>Acción</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:if="${#lists.isEmpty(pedidos)}">
                        <td colspan="6" class="text-muted">
                            No hay pedidos pendientes para finalizar
                        </td>
                    </tr>

                    <tr th:each="pedido : ${pedidos}">
                        <td th:text="${pedido.id}"></td>
                        <td th:text="${pedido.mesa}"></td>
                        <td th:text="${pedido.clienteNombre}"></td>
                        <td>
                            <span class="badge bg-primary" th:text="${pedido.estadoPedido}"></span>
                        </td>
                        <td th:text="'S/ ' + ${#numbers.formatDecimal(pedido.precioTotal, 1, 2)}"></td>
                        <td>
                            <a th:href="@{/venta/finalizar-pedido/{id}(id=${pedido.id})}"
                               class="btn btn-sm btn-success menu-btn">
                                Finalizar
                            </a>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>

    </div>

</div>

</body>
</html>
