<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Finalizar pedido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <a class="navbar-brand fw-bold" th:href="@{/venta}">Ventas</a>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/venta}" class="btn btn-outline-success btn-sm">Ventas</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">Pedidos disponibles para finalizar</h4>
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Mesa</th>
                    <th>Cliente</th>
                    <th>Estado</th>
                    <th>Total</th>
                    <th>Acción</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${#lists.isEmpty(pedidos)}">
                    <td colspan="6" class="text-center text-muted">
                        No hay pedidos pendientes para finalizar
                    </td>
                </tr>

                <tr th:each="pedido : ${pedidos}">
                    <td th:text="${pedido.id}"></td>
                    <td th:text="${pedido.mesa}"></td>
                    <td th:text="${pedido.clienteNombre}"></td>
                    <td>
                        <span class="badge bg-primary" th:text="${pedido.estadoPedido}"></span>
                    </td>
                    <td th:text="'S/ ' + ${#numbers.formatDecimal(pedido.precioTotal, 1, 2)}"></td>
                    <td>
                        <a th:href="@{/venta/finalizar-pedido/{id}(id=${pedido.id})}"
                           class="btn btn-sm btn-success">
                            Finalizar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
