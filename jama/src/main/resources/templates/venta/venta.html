<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ventas - FastFood Jama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .menu-btn {
            transition: all 0.25s ease;
            border-radius: 10px;
        }
        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/pedido}" class="btn btn-outline-warning btn-sm">Pedidos</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow">

        <div class="card-header bg-success text-white text-center">
            <h4 class="mb-0 fw-bold">Registro de ventas</h4>
        </div>

        <div class="card-body text-center">

            <p class="text-muted mb-4">
                Desde este módulo puedes finalizar pedidos y consultar las ventas registradas.
            </p>

            <div class="d-grid gap-3" style="max-width: 400px; margin: auto;">

                <a th:href="@{/venta/finalizar-pedido}" class="btn btn-success fw-bold menu-btn">
                    Finalizar pedido
                </a>

                <a th:href="@{/venta/venta-listado}" class="btn btn-primary fw-bold menu-btn">
                    Listado de ventas
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
