<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <a class="navbar-brand fw-bold" th:href="@{/venta}">Ventas</a>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/pedido}" class="btn btn-outline-warning btn-sm">Pedidos</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">Registro de ventas</h4>
        </div>

        <div class="card-body">
            <p>Desde este módulo puedes finalizar pedidos y consultar las ventas registradas.</p>

            <a th:href="@{/venta/finalizar-pedido}" class="btn btn-success">
                Finalizar pedido
            </a>

            <a th:href="@{/venta/venta-listado}" class="btn btn-primary">
                Listado de ventas
            </a>
        </div>
    </div>

</div>

</body>
</html>
