<!DOCTYPE  html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Menu Principal</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <p class="text-muted" th:text="'Usuario: ' + ${session.loginid}"></p>

        <div class="d-flex justify-content-center align-items-center vh-100">
            <div class="text-center">

                <h2 class="mb-4">Menú Principal</h2>

                <div class="d-grid gap-3">

                    <a th:href="@{/pedido}" class="btn btn-primary">Pedido</a>

                    <a th:href="@{/venta}" class="btn btn-success">Venta</a>

                    <a th:href="@{/usuario}" class="btn btn-secondary">Usuario</a>

                </div>

            </div>
        </div>
    </body>
</html>
