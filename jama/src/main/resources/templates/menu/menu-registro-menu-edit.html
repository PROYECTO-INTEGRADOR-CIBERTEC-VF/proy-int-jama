<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Menu Form</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

        <style>
            body {
                background-color: #f5f7fa;
            }

            .panel {
                background: #fff;
                border-radius: 16px;
                box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
                padding: 24px;
            }

            .section-title {
                font-weight: 700;
                margin-bottom: 1rem;
            }

            .sku-card {
                border: 1px solid #dee2e6;
                border-radius: 14px;
                padding: 16px;
                margin-bottom: 16px;
                background: #fafafa;
            }

            .remove-btn {
                margin-top: 32px;
            }
        </style>
    </head>
    <body>

        <div class="container-fluid py-4">
            <div class="row g-4">

                <!-- LEFT SIDE: MENU FORM -->
                <div class="col-lg-5">
                    <div class="panel">
                        <h3 class="section-title">Menu Form</h3>

                        <form th:object="${menuList}" th:action="@{/menu/menu-registro-menu/edit/{id}(id = ${menuList.id}) }" method="post">
                            <input type="hidden" name="id" th:field="*{id}">

                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" id="nombre" name="nombre" class="form-control"
                                       placeholder="Menu name"
                                       th:field="*{nombre}" required>
                            </div>

                            <div class="mb-3 form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="estaBloqueado" name="estaBloqueado"
                                       th:field="*{estaBloqueado}">
                                <label class="form-check-label" for="estaBloqueado">Está bloqueado</label>
                            </div>

                            <div class="mb-3">
                                <label for="precioTotal" class="form-label">Precio Total</label>
                                <input type="number" step="0.01" id="precioTotal" name="precioTotal"
                                       class="form-control"
                                       th:field="*{precioTotal}" placeholder="0.00"
                                       readonly
                                >
                            </div>

                            <div class="mb-3">
                                <label for="descuento" class="form-label">Descuento</label>
                                <input type="number" step="0.01" id="descuento" name="descuento" class="form-control"
                                       th:field="*{descuento}" placeholder="0.00"
                                       onchange="addDisscountOnChange()"
                                >
                            </div>

                            <hr class="my-4">

                            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                                <h4 class="section-title mb-0">Menu SKUs</h4>

                                <div class="d-flex align-items-center gap-2 ms-auto">
                                    <select id="skuSelect"
                                            class="form-select form-select-sm w-auto rounded-3 shadow-sm"
                                            style="min-width: 220px;">
                                        <option
                                                th:each="sku : ${menuSkus}"
                                                th:value="${sku.id}"
                                                th:text="${sku.nombre}"
                                                th:attr="
                                                data-nombre=${sku.precio}
                                                "
                                        ></option>

                                    </select>

                                    <button type="button"
                                            class="btn btn-primary btn-sm rounded-3 px-3"
                                            onclick="addSku()"
                                    >
                                        + Add MenuSku
                                    </button>

                                </div>
                            </div>
                            <!--hidden inputs that sping will read-->
                            <div id="hiddenInputs">

                            </div>

                            <!--card skus-->
                            <div class="card shadow-sm border-0 rounded-4 mt-3">
                                <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center">
                                    <h5 class="mb-0 fw-semibold">Selected Menu SKUs</h5>
                                    <span id="menuSkuCounter" class="badge bg-primary">0</span>
                                </div>

                                <div class="card-body p-0">
                                    <div class="table-responsive">
                                        <table class="table table-hover align-middle mb-0" id="skuTableBody">
                                            <thead class="table-light">
                                                <tr>
                                                    <th class="ps-4">ID</th>
                                                    <th>Nombre</th>
                                                    <th>Precio</th>
                                                    <th class="text-end pe-4">Acciones</th>
                                                </tr>
                                            </thead>
                                                <tr th:each="sku : ${skuList}">
                                                    <td
                                                            th:text="'#' + ${sku.id}"
                                                            class="ps-4 fw-semibold text-primary the-row-id-for-skus-table the-row-id-for-skus-table">

                                                    </td>
                                                    <td th:text="${sku.nombre}"></td>
                                                    <td th:text="${sku.precio}"></td>
                                                    <td class="text-end pe-4">
                                                        <button class="btn btn-sm btn-outline-danger"
                                                                th:onclick="|removeRow(${sku.precio}, this, ${sku.id})|">
                                                            Remove
                                                        </button>
                                                    </td>

                                                </tr>
                                        </table>
                                    </div>
                                </div>
                            </div>
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-success w-100">Save Menu</button>
                                <button type="reset" class="btn btn-outline-secondary w-100">Clear</button>
                            </div>
                        </form>
                    </div>
                    <div>
                        <!-- Back button -->
                        <div class="text-left mt-3">
                            <a class="btn btn-secondary">Volver</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>


    </body>
    <script>
        let index = 0
        let count = 0
        let currentPrice = 0
        let isInitTheEdit = false

        document.addEventListener("DOMContentLoaded", function () {
            const rowsInTable = document.querySelectorAll('.the-row-id-for-skus-table')
            count = rowsInTable.length
            let counter = document.getElementById("menuSkuCounter")
            counter.textContent = count
            if (!isInitTheEdit){
                rowsInTable.forEach(row => {
                    let rowId = row.textContent.replace("#","")
                    initEditSkuList(rowId)
                    isInitTheEdit = true
                    index++;
                })
            }

        })

        function initEditSkuList(rowId) {
            //  Add hidden input
            const hidden = document.getElementById("hiddenInputs");
            const input = document.createElement("input");
            // input.type = "hidden";
            input.name = `menuSkus[${index}].id`;
            input.value = rowId;
            input.id = `input-${rowId}`;
            hidden.appendChild(input);



        }


        function addSku() {

            const totalPriceInput = document.getElementById("precioTotal")
            const select = document.getElementById("skuSelect");
            const selectedOption = select.options[select.selectedIndex];
            const id = select.value
            let idExist = false

            // it problably should to be able to add multiple items
            const rowsInTable = document.querySelectorAll('.the-row-id-for-skus-table')
            rowsInTable.forEach(row => {
                let rowId = row.textContent.replace("#","")

                if (row.textContent === `#${id}`) {
                    alert('sku ya existe en la lista')
                    idExist = true
                }
            })

            if (idExist) return;


            const name = selectedOption.text
            const price = selectedOption.getAttribute("data-nombre")

            let counter = document.getElementById("menuSkuCounter")

            if (!id) return;

            const table = document.getElementById("skuTableBody");

            const row = document.createElement("tr");
            row.innerHTML = `
        <td class="ps-4 fw-semibold text-primary the-row-id-for-skus-table">#${id}</td>
        <td>${name}</td>
        <td>${price}</td>
        <td class="text-end pe-4">
            <button  class="btn btn-sm btn-outline-danger"  onclick="removeRow(${price},this, ${id})">
                Remove
            </button>
        </td>
                `;

            table.appendChild(row);

            initEditSkuList(id)
            index++;
            count = rowsInTable.length + 1;
            currentPrice = Number(currentPrice) + Number(price);
            counter.textContent = count.toString()
            totalPriceInput.value = addDiscount(currentPrice)
        }

        function removeRow(price, button, idx) {

            console.log(button.closest('tr'))
            const totalPriceInput = document.getElementById("precioTotal")

            let counter = document.getElementById("menuSkuCounter")
            button.closest("tr").remove();

            const input = document.getElementById(`input-${idx}`);
            if (input) input.remove();

            count--
            index--
            counter.textContent = count.toString();
            currentPrice = Number(currentPrice) - Number(price);
            totalPriceInput.value = addDiscount(currentPrice)

        }

        function addDisscountOnChange() {
            const totalPriceInput = document.getElementById("precioTotal")
            const discount = document.getElementById("descuento")

            totalPriceInput.value = Number(currentPrice) * Number(discount.value)
        }

        function addDiscount(currentPrice) {
            const discount = document.getElementById("descuento")
            if (Number(discount.value) === 0) {
                return currentPrice;
            } else {
                return currentPrice * Number(discount.value)
            }
        }
    </script>
</html>
