<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Editar Menú - FastFood Jama</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

        <style>
            .menu-btn {
                transition: all 0.25s ease;
                border-radius: 10px;
            }

            .menu-btn:hover {
                transform: scale(1.05);
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            }

            .panel {
                border-radius: 16px;
            }

            .section-title {
                font-weight: 700;
                margin-bottom: 1rem;
            }
        </style>
    </head>

    <body class="bg-dark text-light">

        <nav class="navbar navbar-dark bg-black px-4">
            <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>

            <div>
                <a th:href="@{/menu}" class="btn btn-outline-light btn-sm">← Gestión del menú</a>
                <a th:href="@{/menu/main-menu}" class="btn btn-outline-warning btn-sm">Menú principal</a>
            </div>
        </nav>

        <div class="container py-4">

            <div class="card bg-secondary-subtle text-dark shadow panel mx-auto" style="max-width: 720px;">

                <div class="card-header bg-warning text-center">
                    <h3 class="mb-0 fw-bold">Editar Menú</h3>
                </div>

                <div class="card-body">

                    <form th:object="${menuList}"
                          th:action="@{/menu/menu-registro-menu/edit/{id}(id = ${menuList.id}) }" method="post">
                        <input type="hidden" name="id" th:field="*{id}">

                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" id="nombre" name="nombre" class="form-control"
                                   placeholder="Menu name"
                                   th:field="*{nombre}" required>
                        </div>

                        <div class="mb-3 form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="estaBloqueado" name="estaBloqueado"
                                   th:field="*{estaBloqueado}">
                            <label class="form-check-label" for="estaBloqueado">Está bloqueado</label>
                        </div>

                        <div class="mb-3">
                            <label for="precioTotal" class="form-label">Precio Total</label>
                            <input type="number" step="0.01" id="precioTotal" name="precioTotal"
                                   class="form-control"
                                   th:field="*{precioTotal}" placeholder="0.00"
                                   readonly>
                        </div>

                        <div class="mb-3">
                            <label for="descuento" class="form-label">Descuento</label>
                            <input type="number" step="0.01" id="descuento" name="descuento" class="form-control"
                                   th:field="*{descuento}" placeholder="0.00"
                                   onchange="addDisscountOnChange()">
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                            <h4 class="section-title mb-0">Menu SKUs</h4>

                            <div class="d-flex align-items-center gap-2 ms-auto">
                                <select id="skuSelect"
                                        class="form-select form-select-sm w-auto rounded-3 shadow-sm"
                                        style="min-width: 220px;">
                                    <option
                                            th:each="sku : ${menuSkus}"
                                            th:value="${sku.id}"
                                            th:text="${sku.nombre}"
                                            th:attr="
                                    data-nombre=${sku.precio}
                                    ">
                                    </option>
                                </select>

                                <button type="button"
                                        class="btn btn-primary btn-sm rounded-3 px-3 menu-btn"
                                        onclick="addSku()">
                                    + Add MenuSku
                                </button>
                            </div>
                        </div>

                        <div id="hiddenInputs" hidden></div>

                        <div class="card shadow-sm border-0 rounded-4 mt-3">
                            <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center">
                                <h5 class="mb-0 fw-semibold">Selected Menu SKUs</h5>
                                <span id="menuSkuCounter" class="badge bg-primary">0</span>
                            </div>

                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover align-middle mb-0" id="skuTableBody">
                                        <thead class="table-dark">
                                            <tr>
                                                <th class="ps-4">ID</th>
                                                <th>Nombre</th>
                                                <th>Precio</th>
                                                <th class="text-end pe-4">Acciones</th>
                                            </tr>
                                        </thead>

                                        <tr th:each="sku : ${skuList}">
                                            <td
                                                    th:text="'#' + ${sku.id}"
                                                    class="ps-4 fw-semibold text-primary the-row-id-for-skus-table the-row-id-for-skus-table">
                                            </td>
                                            <td th:text="${sku.nombre}"></td>
                                            <td class="the-row-price-for-skus-table" th:text="${sku.precio}"></td>
                                            <td class="text-end pe-4">
                                                <button class="btn btn-sm btn-outline-danger"
                                                        th:onclick="|removeRow(${sku.precio}, this, ${sku.id})|">
                                                    Remove
                                                </button>
                                            </td>
                                        </tr>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success w-100 fw-bold menu-btn">Save Menu</button>
                            <button type="reset" class="btn btn-outline-secondary w-100 fw-bold">Clear</button>
                        </div>
                    </form>

                </div>
            </div>

            <div class="text-left mt-3 mx-auto" style="max-width: 720px;">
                <a th:href="@{/menu/menu-registro-menu}" class="btn btn-secondary">Volver</a>
            </div>

        </div>

    </body>

    <script>
        let index = 0
        let count = 0
        let currentPrice = 0
        let isInitTheEdit = false
        let isInitPriceSet = false

        document.addEventListener("DOMContentLoaded", function () {
            const rowsInTable = document.querySelectorAll('.the-row-id-for-skus-table')
            count = rowsInTable.length
            let counter = document.getElementById("menuSkuCounter")
            counter.textContent = count
            if (!isInitTheEdit) {
                rowsInTable.forEach(row => {
                    let rowId = row.textContent.replace("#", "")
                    initEditSkuList(rowId)
                    isInitTheEdit = true
                    index++;
                })


            }
            updateCurrentPriceWhenInit()


        })

        function initEditSkuList(rowId) {
            const hidden = document.getElementById("hiddenInputs");
            const input = document.createElement("input");
            input.name = `menuSkus[${index}].id`;
            input.value = rowId;
            input.id = `input-${rowId}`;
            hidden.appendChild(input);
        }


        function addSku() {

            const totalPriceInput = document.getElementById("precioTotal")
            const select = document.getElementById("skuSelect");
            const selectedOption = select.options[select.selectedIndex];
            const id = select.value
            let idExist = false

            const rowsInTable = document.querySelectorAll('.the-row-id-for-skus-table')
            rowsInTable.forEach(row => {
                let rowId = row.textContent.replace("#", "")

                if (row.textContent === `#${id}`) {
                    alert('sku ya existe en la lista')
                    idExist = true
                }
            })

            if (idExist) return;


            const name = selectedOption.text
            const price = selectedOption.getAttribute("data-nombre")

            let counter = document.getElementById("menuSkuCounter")

            if (!id) return;

            const table = document.getElementById("skuTableBody");

            const row = document.createElement("tr");
            row.innerHTML = `
        <td class="ps-4 fw-semibold text-primary the-row-id-for-skus-table">#${id}</td>
        <td>${name}</td>
        <td class="the-row-price-for-skus-table">${price}</td>
        <td class="text-end pe-4">
            <button  class="btn btn-sm btn-outline-danger"  onclick="removeRow(${price},this, ${id})">
                Remove
            </button>
        </td>
                `;

            table.appendChild(row);

            initEditSkuList(id)
            index++;
            count = rowsInTable.length + 1;
            currentPrice = Number(currentPrice) + Number(price);
            counter.textContent = count.toString()
            totalPriceInput.value = addDiscount(currentPrice)
        }

        function removeRow(price, button, idx) {

            console.log(button.closest('tr'))
            const totalPriceInput = document.getElementById("precioTotal")

            let counter = document.getElementById("menuSkuCounter")
            button.closest("tr").remove();

            const input = document.getElementById(`input-${idx}`);
            if (input) input.remove();

            count--
            index--
            counter.textContent = count.toString();

            currentPrice = Number(currentPrice) - Number(price)

            totalPriceInput.value = addDiscount(currentPrice)

        }
        function updateCurrentPriceWhenInit(){
            const rowsPriceInTable = document.querySelectorAll('.the-row-price-for-skus-table')

            if (!isInitPriceSet){
                rowsPriceInTable.forEach(row =>{
                    currentPrice +=  Number(row.textContent)
                    console.log(row.textContent)
                    console.log(currentPrice)

                })
                isInitPriceSet = true
            }
        }

        function addDisscountOnChange() {
            const totalPriceInput = document.getElementById("precioTotal")
            const discount = document.getElementById("descuento")

            totalPriceInput.value = Number(currentPrice) * Number(discount.value)
        }

        function addDiscount(currentPrice) {
            const discount = document.getElementById("descuento")
            if (Number(discount.value) === 0) {
                return currentPrice;
            } else {
                return currentPrice * Number(discount.value)
            }
        }
    </script>
</html>
