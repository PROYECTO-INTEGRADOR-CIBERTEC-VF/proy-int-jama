<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario - FastFood Jama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .menu-btn {
            transition: all 0.25s ease;
            border-radius: 10px;
        }
        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/usuario}" class="btn btn-outline-warning btn-sm">Usuarios</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow mx-auto" style="max-width: 600px;">

        <div class="card-header bg-warning text-center">
            <h3 class="mb-0 fw-bold">Edición de Usuario</h3>
        </div>

        <div class="card-body">

            <form th:object="${usuarioDataDto}" th:action="@{/usuario/usuario-registro/edit}" method="post">

                <input type="hidden" name="id" th:value="*{users.id} " th:field="*{users.id}">

                <div class="mb-3">
                    <label class="form-label">Login</label>
                    <input type="text" class="form-control" name="loginid" required th:field="*{users.loginid}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required th:field="*{users.password}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" name="nombre" th:field="*{userData.nombre}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Apellido</label>
                    <input type="text" class="form-control" name="apellido" th:field="*{userData.apellido}">
                </div>

                <div class="mb-3">
                    <label class="form-label">DNI</label>
                    <input type="text" class="form-control" name="dni" th:field="*{userData.dni}">
                </div>

                <div class="mb-3">
                    <label class="form-label">¿Está bloqueado?</label>
                    <select class="form-select" name="estaBloqueado" th:field="*{users.estaBloqueado}">
                        <option value="false">No</option>
                        <option value="true">Sí</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">User Rol</label>
                    <select class="form-select" name="userRol" th:field="*{users.userRol}">
                        <option
                                th:each="r : ${usuarioDataDto.userRols}"
                                th:value="${r.id}"
                                th:text="${r.rol}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Cargo</label>
                    <select class="form-select" name="cargo" th:field="*{userData.cargo}">
                        <option
                                th:each="r : ${usuarioDataDto.userPositions}"
                                th:value="${r.id}"
                                th:text="${r.nombre}">
                        </option>
                    </select>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success w-100 fw-bold menu-btn">Guardar</button>
                    <!--        <a th:href="@{/main/back}" class="btn btn-secondary">Cancelar</a>-->
                    <button type="button" class="btn btn-secondary w-100 fw-bold" onclick="history.back()">Cancelar</button>
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
