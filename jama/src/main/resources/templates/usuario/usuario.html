<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - FastFood Jama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        .menu-btn {
            transition: all 0.25s ease;
            border-radius: 10px;
        }

        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
    </div>
</nav>

<div class="container d-flex justify-content-center align-items-center" style="height: 85vh;">

    <div class="card bg-secondary-subtle text-dark shadow text-center" style="width: 380px;">

        <div class="card-header bg-secondary text-white">
            <h3 class="mb-0 fw-bold">Gestión de Usuarios</h3>
        </div>

        <div class="card-body">

            <p class="text-muted mb-3" th:text="'Usuario: ' + ${session.loginid}"></p>

            <p class="text-muted mb-4">
                Administra los usuarios del sistema
            </p>

            <div class="d-grid gap-3">

                <a th:href="@{/usuario/usuario-listado}" class="btn btn-primary fw-bold menu-btn">
                    <i class="bi bi-people-fill me-2"></i>Listado de usuarios
                </a>

                <a th:href="@{/usuario/usuario-registro}" class="btn btn-success fw-bold menu-btn">
                    <i class="bi bi-person-plus-fill me-2"></i>Registrar nuevo usuario
                </a>

                <a th:href="@{/usuario/usuario-registro-cargos}" class="btn btn-warning fw-bold menu-btn">
                    <i class="bi bi-briefcase-fill me-2"></i>Registrar nuevos cargos
                </a>

                <a th:href="@{/menu/main-menu}" class="btn btn-secondary mt-2 fw-bold">
                    Volver al menú principal
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
