<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Usuarios - FastFood Jama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .menu-btn {
            transition: all 0.25s ease;
            border-radius: 10px;
        }
        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>

    <div>
        <a th:href="@{/usuario}" class="btn btn-outline-light btn-sm">← Usuarios</a>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-warning btn-sm">Menú principal</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow">

        <div class="card-header bg-primary text-white text-center">
            <h3 class="mb-0 fw-bold">Listado de Usuarios</h3>
        </div>

        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle text-center">

                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Login</th>
                        <th>Nombre Completo</th>
                        <th>Bloqueado</th>
                        <th>Rol</th>
                        <th>Cargo</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="u : ${users}">

                        <td th:text="${u.id}"></td>

                        <td th:text="${u.loginid}"></td>

                        <td th:text="${u.userData.nombre + ' ' + u.userData.apellido}"></td>

                        <td>
                            <span th:text="${u.estaBloqueado ? 'Sí' : 'No'}"
                                  th:classappend="${u.estaBloqueado} ? 'text-danger' : 'text-success'">
                            </span>
                        </td>

                        <td th:text="${u.userRol.rol}"></td>

                        <td th:text="${u.userData.cargo}"></td>

                        <td>
                            <a th:href="@{/usuario/usuario-listado/edit/{id}(id=${u.id})}"
                               class="btn btn-warning btn-sm menu-btn">✏️</a>

                            <a th:href="@{/usuario/usuario-listado/delete/{id}(id=${u.id})}"
                               class="btn btn-danger btn-sm menu-btn"
                               onclick="return confirm('¿Eliminar usuario?')">🗑</a>
                        </td>

                    </tr>
                    </tbody>

                </table>
            </div>

            <div class="text-center mt-3">
                <a th:href="@{/usuario}" class="btn btn-secondary fw-bold">Volver</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
