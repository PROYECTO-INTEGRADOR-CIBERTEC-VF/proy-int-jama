<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Cargo - FastFood Jama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .menu-btn {
            transition: all 0.25s ease;
            border-radius: 10px;
        }
        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>

    <div>
        <a th:href="@{/usuario}" class="btn btn-outline-light btn-sm">← Usuarios</a>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-warning btn-sm">Menú principal</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow mx-auto" style="max-width: 600px;">

        <div class="card-header bg-warning text-center">
            <h3 class="mb-0 fw-bold">Edición de Cargo</h3>
        </div>

        <div class="card-body">

            <form th:object="${position}" th:action="@{/usuario/usuario-registro-cargos/update/{id}(id=${position.id})}" method="post">

                <input type="hidden" name="id" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control"
                           name="nombre"
                           th:value="*{nombre}"
                           th:field="*{nombre}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea class="form-control"
                              name="descripcion"
                              rows="3"
                              th:text="*{descripcion}"
                              th:field="*{descripcion}">
                    </textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success w-100 fw-bold menu-btn">Guardar</button>
                    <button type="button" class="btn btn-secondary w-100 fw-bold" onclick="history.back()">Cancelar</button>
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
