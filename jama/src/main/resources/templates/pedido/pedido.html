<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pedidos - FastFood Jama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .menu-btn {
            transition: all 0.25s ease;
            border-radius: 10px;
        }
        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/pedido/registrar-pedido}" class="btn btn-warning btn-sm menu-btn">Nuevo pedido</a>
        <a th:href="@{/pedido/seguimiento-pedido}" class="btn btn-success btn-sm menu-btn">Seguimiento</a>
    </div>
</nav>

<div class="container py-4">

    <div th:if="${param.success}" class="alert alert-success text-center">
        Pedido guardado correctamente
    </div>

    <div class="card bg-secondary-subtle text-dark shadow">

        <div class="card-header bg-warning text-center">
            <h4 class="mb-0 fw-bold">Listado de pedidos</h4>
        </div>

        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle text-center">

                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Mesa</th>
                        <th>Cliente</th>
                        <th>Estado</th>
                        <th>Total</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="pedido : ${pedidos}">
                        <td th:text="${pedido.id}"></td>
                        <td th:text="${pedido.mesa}"></td>
                        <td th:text="${pedido.clienteNombre}"></td>
                        <td>
                            <span class="badge bg-primary" th:text="${pedido.estadoPedido}"></span>
                        </td>
                        <td th:text="'S/ ' + ${#numbers.formatDecimal(pedido.precioTotal,1,2)}"></td>
                        <td>
                            <a th:href="@{/pedido/editar/{id}(id=${pedido.id})}" class="btn btn-sm btn-warning menu-btn">Editar</a>

                            <form th:action="@{/pedido/eliminar/{id}(id=${pedido.id})}" method="post" class="d-inline">
                                <button class="btn btn-sm btn-danger menu-btn"
                                        onclick="return confirm('¿Eliminar pedido?')">
                                    Eliminar
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>

                </table>
            </div>

        </div>

    </div>

</div>

</body>
</html>
