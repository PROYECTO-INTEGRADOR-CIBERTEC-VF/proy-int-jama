<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seguimiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <a class="navbar-brand fw-bold" th:href="@{/pedido}">Pedidos</a>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/pedido}" class="btn btn-outline-warning btn-sm">Pedidos</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">Seguimiento de pedidos</h4>
        </div>

        <div class="card-body">

            <p class="text-muted">
                Visualiza y actualiza el estado de los pedidos pendientes.
            </p>

            <div class="alert alert-info" th:if="${#lists.isEmpty(pedidosPendientes)}">
                No hay pedidos pendientes por preparar.
            </div>

            <div th:each="p : ${pedidosPendientes}" class="mb-3 border rounded p-3 bg-white">

                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5 th:text="'Pedido #' + ${p.id}"></h5>
                        <p class="mb-1" th:text="'Mesa: ' + ${p.mesa}"></p>
                        <p class="mb-1" th:text="'Cliente: ' + ${p.clienteNombre}"></p>
                        <p class="mb-1">
                            <b>Estado actual:</b>
                            <span class="badge bg-primary" th:text="${p.estadoPedido}"></span>
                        </p>
                    </div>

                    <div>
                        <form th:action="@{/pedido/actualizar-estado/{id}(id=${p.id})}" method="post" class="mb-2">
                            <input type="hidden" name="estadoPedido" value="PENDIENTE">
                            <button class="btn btn-sm btn-warning w-100" type="submit">
                                Pendiente
                            </button>
                        </form>

                        <form th:action="@{/pedido/actualizar-estado/{id}(id=${p.id})}" method="post" class="mb-2">
                            <input type="hidden" name="estadoPedido" value="EN_PREPARACION">
                            <button class="btn btn-sm btn-info w-100" type="submit">
                                En preparación
                            </button>
                        </form>

                        <form th:action="@{/pedido/actualizar-estado/{id}(id=${p.id})}" method="post">
                            <input type="hidden" name="estadoPedido" value="TERMINADO">
                            <button class="btn btn-sm btn-success w-100" type="submit">
                                Terminado
                            </button>
                        </form>
                    </div>
                </div>

            </div>

        </div>
    </div>

</div>
</body>
</html>
