<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seguimiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <a class="navbar-brand fw-bold" th:href="@{/pedido}">Pedidos</a>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/pedido}" class="btn btn-outline-warning btn-sm">Pedidos</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow">
        <div class="card-header bg-success text-white">
            <h4>Seguimiento de pedidos</h4>
        </div>

        <div class="card-body">

            <div th:each="p : ${pedidosPendientes}" class="mb-3 border p-3">
                <h5 th:text="'Pedido #' + ${p.id}"></h5>
                <p th:text="'Mesa: ' + ${p.mesa}"></p>
                <p th:text="'Cliente: ' + ${p.clienteNombre}"></p>
                <p><b>Estado:</b> <span th:text="${p.estadoPedido}"></span></p>
            </div>

        </div>
    </div>

</div>
</body>
</html>
