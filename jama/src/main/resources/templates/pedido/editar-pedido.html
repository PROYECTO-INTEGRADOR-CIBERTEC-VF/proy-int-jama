<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Pedido - FastFood Jama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .menu-btn {
            transition: all 0.25s ease;
            border-radius: 10px;
        }
        .menu-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <span class="navbar-brand fw-bold">🍔 FastFood Jama</span>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/pedido}" class="btn btn-outline-warning btn-sm">Pedidos</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow">

        <div class="card-header bg-warning text-center">
            <h4 class="mb-0 fw-bold">Editar Pedido</h4>
        </div>

        <div class="card-body">

            <form th:action="@{/pedido/actualizar/{id}(id=${pedido.id})}" method="post">

                <div class="row mb-3">
                    <div class="col-md-4">
                        <input type="text" name="mesa" th:value="${pedido.mesa}" class="form-control" placeholder="Mesa">
                    </div>

                    <div class="col-md-4">
                        <input type="text" name="clienteNombre" th:value="${pedido.clienteNombre}" class="form-control" placeholder="Cliente">
                    </div>

                    <div class="col-md-4">
                        <input type="text" name="comentarios" th:value="${pedido.comentarios}" class="form-control" placeholder="Comentarios">
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button class="btn btn-success w-100 fw-bold menu-btn">Guardar cambios</button>
                    <button type="button" class="btn btn-secondary w-100 fw-bold" onclick="history.back()">Cancelar</button>
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
